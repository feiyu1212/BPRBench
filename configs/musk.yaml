data:
  image_dir: ${BENCHMARK_IMAGE_DIR}
  questions_file: ${BENCHMARK_QUESTIONS_FILE}
  output_dir: data/results/musk_evaluation

model:
  architecture: musk
  device: cuda
  args:
    checkpoint: ${MUSK_CHECKPOINT}
    tokenizer: ${MUSK_TOKENIZER}

eval:
  batch_size: 512
  num_workers: 16
  system_prompt: You are a professional pathology expert.
  positive_label: A
  force_run: true
  use_cache: false
  extractor_repair: true
  extractor_max_retries: 1
  extractor_retry_backoff_s: 0.0
