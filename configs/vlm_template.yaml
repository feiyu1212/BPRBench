data:
  image_dir: ${BENCHMARK_IMAGE_DIR}
  questions_file: ${BENCHMARK_QUESTIONS_FILE}
  # output_dir will be overridden by the script
  output_dir: data/results/vlm_temp

model:
  architecture: vlm
  device: cpu
  args:
    # These placeholders are populated by the runner script.
    provider: ${VLM_PROVIDER}
    model: ${VLM_MODEL_NAME}
    base_url: ${VLM_BASE_URL}
    api_key: ${VLM_API_KEY}
    timeout: 120
    temperature: 0.0

eval:
  batch_size: 4
  num_workers: 16
  system_prompt: You are a professional pathology expert.
  positive_label: A
  force_run: true
  use_cache: true
  extractor_repair: true
  extractor_max_retries: 1

